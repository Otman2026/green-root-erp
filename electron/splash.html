<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>Haytam AGRI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: linear-gradient(135deg, #0f5132 0%, #1a7a4c 50%, #22c55e 100%);
      color: #fff;
      font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }
    .wrap { text-align: center; padding: 32px; }
    .logo {
      width: 128px; height: 128px; border-radius: 28px;
      background: rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px; backdrop-filter: blur(8px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .logo img { width: 96px; height: 96px; object-fit: contain; }
    h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.5px; }
    p { font-size: 15px; opacity: 0.85; margin-bottom: 32px; }
    .spinner {
      width: 36px; height: 36px; margin: 0 auto;
      border: 3px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    .status { margin-top: 20px; font-size: 13px; opacity: 0.75; min-height: 18px; }
    .error { color: #fecaca; }
    .retry {
      margin-top: 16px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff; padding: 10px 24px; border-radius: 10px;
      font-size: 14px; cursor: pointer; display: none;
    }
    .retry:hover { background: rgba(255,255,255,0.25); }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo"><img src="icon.png" alt="Haytam AGRI" onerror="this.style.display='none'" /></div>
    <h1>Haytam AGRI</h1>
    <p>نظام إدارة الموارد الزراعية</p>
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">جارٍ التحميل…</div>
    <button class="retry" id="retry" onclick="window.electronAPI && window.electronAPI.retry()">إعادة المحاولة</button>
  </div>
  <script>
    // Listen for status updates from main process
    if (window.electronAPI && window.electronAPI.onStatus) {
      window.electronAPI.onStatus((msg, isError) => {
        const s = document.getElementById('status');
        const r = document.getElementById('retry');
        const sp = document.getElementById('spinner');
        s.textContent = msg;
        s.className = 'status' + (isError ? ' error' : '');
        if (isError) { r.style.display = 'inline-block'; sp.style.display = 'none'; }
      });
    }
  </script>
</body>
</html>
