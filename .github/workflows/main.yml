name: Build Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify main entry exists
        shell: pwsh
        run: |
          if (-Not (Test-Path "electron/main.cjs")) {
            Write-Error "electron/main.cjs is missing — aborting build"
            exit 1
          }
          if (-Not (Test-Path "electron-builder.yml")) {
            Write-Error "electron-builder.yml is missing — aborting build"
            exit 1
          }
          Write-Host "Electron entry points OK"

      - name: Ensure app icon exists
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          if (-Not (Test-Path "build/icon.ico")) {
            Write-Host "Generating build/icon.ico from public/icon-512.png"
            npm i -g png-to-ico
            # Use Node to write binary output — PowerShell '>' corrupts binary via UTF-16 pipe
            node -e "require('png-to-ico')('public/icon-512.png').then(buf => require('fs').writeFileSync('build/icon.ico', buf))"
          } else {
            Write-Host "build/icon.ico already present"
          }
          if (-Not (Test-Path "build/icon.ico")) { Write-Error "icon.ico missing"; exit 1 }
          $size = (Get-Item "build/icon.ico").Length
          Write-Host "icon.ico size: $size bytes"
          if ($size -lt 1000) { Write-Error "icon.ico too small — likely corrupted"; exit 1 }

      - name: Build Windows installer (NSIS)
        run: npx electron-builder --win nsis --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Haytam-AGRI-Windows-Setup
          path: electron-release/*Setup*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: electron-release/*Setup*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
