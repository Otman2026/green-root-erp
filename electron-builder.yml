appId: com.haytam.agri
productName: Haytam AGRI
directories:
  output: dist-electron
  buildResources: electron
files:
  - dist/**/*
  - electron/**/*
  - package.json
win:
  target:
    - nsis
  artifactName: HaytamAGRI-Setup-${version}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Haytam AGRI
