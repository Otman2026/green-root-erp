appId: com.haytam.agri
productName: Haytam AGRI
copyright: Copyright © 2026 Haytam AGRI
directories:
  output: electron-release
  buildResources: build
files:
  - electron/**/*
  - package.json
  - "!node_modules/**/*"
extraMetadata:
  main: electron/main.cjs
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: "Haytam-AGRI-Setup-${version}.${ext}"
  signAndEditExecutable: false
  signtoolOptions: null
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Haytam AGRI
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  runAfterFinish: true
  differentialPackage: false

